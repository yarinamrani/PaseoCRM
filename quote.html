<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'" />
<title>הצעת מחיר · PASEO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#efe7d7; --paper-2:#f7f1e6; --card:#fbf7ef;
    --ink:#2b2620; --ink-2:#7c7263; --ink-3:#9b917f;
    --gold:#a9842a; --gold-2:#c2a042; --gold-soft:rgba(169,132,42,.10);
    --line:#e2d7c2; --line-2:#ead9; --ok:#3a8f5b;
    --radius:16px; --shadow:0 10px 34px rgba(80,64,30,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:96px;
    background-image:radial-gradient(circle at 50% 0%,rgba(255,255,255,.5),transparent 40%)}
  .serif{font-family:'Frank Ruhl Libre',serif}
  .wrap{max-width:600px;margin:0 auto;padding:0 18px}
  img{display:block;max-width:100%}

  /* header */
  .top{text-align:center;padding:30px 18px 16px}
  .logo{color:var(--gold);height:78px;margin:0 auto 4px;display:block}
  .top .tag{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--ink-3)}
  /* hero photo */
  .hero{position:relative;max-width:600px;margin:6px auto 0;padding:0 18px}
  .hero img{width:100%;height:230px;object-fit:cover;border-radius:var(--radius);box-shadow:var(--shadow)}
  .hero-cap{position:absolute;inset:0 18px;display:flex;align-items:flex-end;padding:18px;border-radius:var(--radius);
    background:linear-gradient(0deg,rgba(28,22,14,.55),transparent 55%)}
  .hero-cap b{font-family:'Frank Ruhl Libre',serif;color:#fff;font-size:22px;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,.4)}

  .intro{text-align:center;font-size:15px;line-height:1.7;color:var(--ink-2);margin:20px auto 4px;max-width:480px}
  .intro b{color:var(--ink)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:0 4px 18px rgba(80,64,30,.06)}
  .ev-h{font-family:'Frank Ruhl Libre',serif;font-size:26px;color:var(--ink);font-weight:700}
  .ev-sub{font-size:14px;color:var(--ink-2);margin-top:6px}
  .ev-pkg{display:inline-block;margin-top:12px;font-size:12px;font-weight:700;color:var(--gold);background:var(--gold-soft);
    border:1px solid var(--gold);border-radius:999px;padding:6px 15px;letter-spacing:.5px}

  .sec-t{font-family:'Frank Ruhl Libre',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);
    text-align:center;margin:4px 0 16px;position:relative}
  .sec-t::before,.sec-t::after{content:"";position:absolute;top:50%;width:46px;height:1px;background:var(--line)}
  .sec-t::before{right:0}.sec-t::after{left:0}

  .course{margin-bottom:16px}
  .course>b{font-family:'Frank Ruhl Libre',serif;display:block;font-size:15px;color:var(--gold);font-weight:700;margin-bottom:7px;text-align:center}
  .course .d{font-size:15px;color:var(--ink);text-align:center;padding:5px 0;font-weight:500}
  .course .d:not(:last-child){border-bottom:1px solid var(--line)}

  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .gallery img{width:100%;height:104px;object-fit:cover;border-radius:12px}
  .gallery img:first-child{grid-column:1/3;height:150px}

  .brk div{display:flex;justify-content:space-between;gap:10px;font-size:15px;padding:9px 0;color:var(--ink-2)}
  .brk div:not(:last-child){border-bottom:1px dashed var(--line)}
  .brk .disc b{color:var(--ok)}
  .brk .tot{border-bottom:none!important;border-top:2px solid var(--gold);margin-top:6px;padding-top:14px;font-size:21px;font-weight:700;color:var(--ink)}
  .brk .tot b{color:var(--gold)}
  .brk b{font-weight:700;color:var(--ink)}
  .vat{font-size:11px;color:var(--ink-3);text-align:center;margin-top:12px;line-height:1.6}
  .valid{text-align:center;font-size:14px;color:var(--ink-2);margin:20px 0;font-weight:500}
  .footer{text-align:center;font-size:10px;letter-spacing:3px;color:var(--ink-3);text-transform:uppercase;padding:10px 0 4px}

  .accepted-banner{background:rgba(58,143,91,.10);border:1px solid var(--ok);color:#2f7a4e;border-radius:14px;padding:16px;text-align:center;font-weight:700;margin-top:16px}

  .cta-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(247,241,230,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:12px 18px;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:5}
  .cta-inner{max-width:600px;margin:0 auto;display:flex;gap:10px}
  .cta-main{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#fff;border:none;border-radius:13px;
    padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(169,132,42,.32)}
  .cta-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:13px;padding:16px 18px;font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;color:var(--ink-2)}

  .sheet-bg{position:fixed;inset:0;background:rgba(40,32,18,.45);z-index:10;display:none;align-items:flex-end}
  .sheet-bg.open{display:flex}
  .sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:600px;margin:0 auto;box-shadow:0 -10px 40px rgba(0,0,0,.25)}
  .sheet h3{font-family:'Frank Ruhl Libre',serif;font-size:21px;color:var(--ink);margin-bottom:6px}
  .sheet p{font-size:14px;color:var(--ink-2);margin-bottom:16px;line-height:1.6}
  .sheet input{width:100%;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:15px;color:var(--ink);font-size:16px;font-family:inherit;outline:none;margin-bottom:14px}
  .sheet input:focus{border-color:var(--gold)}
  .terms div{font-size:13.5px;color:var(--ink-2);line-height:1.7;padding:3px 0}
  .sig-wrap{position:relative;margin-bottom:8px}
  .sig-canvas{width:100%;height:160px;background:#fff;border:1px dashed var(--gold);border-radius:12px;touch-action:none;display:block;cursor:crosshair}
  .sig-clear{display:block;margin:0 0 14px auto;background:var(--paper-2);border:1px solid var(--line);border-radius:9px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink-2)}
  .sig-hint{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);text-align:center;font-size:13px;color:var(--ink-3);pointer-events:none}
  .sig-show{display:block;max-width:200px;margin:12px auto 0;background:#fff;border-radius:10px;padding:8px;border:1px solid var(--line)}
  span[dir=ltr]{unicode-bidi:isolate}
  .pdf-btn{position:absolute;top:14px;left:30px;background:rgba(251,247,239,.92);border:1px solid var(--line);color:var(--ink);
    border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.15)}
  @media print{
    @page{margin:12mm}
    body{background:#fff;padding:0}
    .cta-bar,.sheet-bg,.pdf-btn{display:none!important}
    .card{box-shadow:none;border-color:#d8cdb8;break-inside:avoid}
    .hero img{height:200px}
    .accepted-banner{break-inside:avoid}
  }
</style>
</head>
<body>
<div id="app"><div class="center">טוען…</div></div>

<script type="module">
const SUPABASE_URL='https://vzeowbriddhvhpishmhn.supabase.co';
const SUPABASE_ANON='sb_publishable_c0zOl9f2zhkGAOb2Vs13dg_1jlnYxzt';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const VENUE_WA='972532272621'; // מספר הוואטסאפ של פסאו

const TRACKS={dairy:'חלבי',meat:'בשרי'};
// תמונות לפי מסלול — ניתן להחליף את הקבצים ב-assets/ בכל עת
const IMGS={
  meat:{hero:'assets/q-hero.jpg',gallery:['assets/q-food1.jpg','assets/q-food3.jpg','assets/q-food2.jpg']},
  dairy:{hero:'assets/q-food2.jpg',gallery:['assets/q-hero.jpg','assets/q-food1.jpg','assets/q-food3.jpg']},
};
const PKG={classic:'CLASSIC',premium:'PREMIUM',deluxe:'DELUXE'};
const COURSES=[['starter','מנות פתיחה'],['rawbar','Raw Bar'],['main','מנות עיקריות'],['dessert','קינוחים']];
const UP_DESC={wine:'יין ובירה חופשי',open:'בר אלכוהול חופשי',cocktail:'תוספת בר קוקטיילים',sushi:'עמדת סושי'};
const TERMS=['לאישור והבטחת התאריך נדרשת מקדמה בסך 30% מערך ההזמנה.','היתרה תשולם עד 7 ימים לפני מועד האירוע.','ביטול עד 30 יום לפני האירוע — החזר מלא של המקדמה; בין 30 ל-14 יום — 50%; פחות מ-14 יום — המקדמה אינה מוחזרת.','המחירים אינם כוללים מע״מ וכפופים להתאמה לפי מספר הסועדים הסופי.','כמות הסועדים הסופית תימסר עד 7 ימים לפני האירוע.'];
const money=n=>`<span dir="ltr">₪${Math.round(Number(n)||0).toLocaleString('he-IL')}</span>`;
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>d?d.split('-').reverse().join('.'):'';
const LOGO=`<svg class="logo" viewBox="0 0 280 130" xmlns="http://www.w3.org/2000/svg" aria-label="PASEO">
  <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".95">
    <line x1="140" y1="8" x2="140" y2="30"/><line x1="118" y1="12" x2="125" y2="33"/><line x1="162" y1="12" x2="155" y2="33"/>
    <line x1="98" y1="22" x2="112" y2="38"/><line x1="182" y1="22" x2="168" y2="38"/><line x1="82" y1="36" x2="102" y2="44"/><line x1="198" y1="36" x2="178" y2="44"/></g>
  <path d="M 110 55 A 30 30 0 0 1 170 55" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <line x1="40" y1="55" x2="108" y2="55" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="172" y1="55" x2="240" y2="55" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <text x="140" y="92" text-anchor="middle" fill="currentColor" font-family="'Frank Ruhl Libre',serif" font-size="34" font-weight="500" letter-spacing="6">PASEO</text>
  <text x="140" y="115" text-anchor="middle" fill="currentColor" font-family="'Heebo',sans-serif" font-size="9" letter-spacing="4" opacity=".75">ROOFTOP LOUNGE &#8226; DINING</text>
</svg>`;

const token=new URLSearchParams(location.search).get('t');
const app=document.getElementById('app');
function fail(msg){app.innerHTML=`<div class="top">${LOGO}</div><div class="center"><div style="font-size:42px">🌅</div><div>${esc(msg)}</div></div>`}

async function load(){
  if(!token){fail('קישור לא תקין');return}
  const {data,error}=await sb.rpc('crm_quote_get',{p_token:token});
  if(error||!data){fail('ההצעה לא נמצאה או שפג תוקפה');return}
  render(data);
}

function render(q){
  const g=Number(q.guests)||0;
  const base=(Number(q.per_person)||0)*g;
  const ups=(q.upgrades||[]).map(u=>({l:u.l||UP_DESC[u.k]||u.k,amt:(Number(u.pp)||0)*g}));
  const customs=(q.custom_lines||[]).filter(c=>c.name).map(c=>({l:c.name,amt:c.per_guest?(Number(c.amount)||0)*g:(Number(c.amount)||0)}));
  const disc=Number(q.discount)||0;
  const accepted=q.status==='accepted';
  const img=IMGS[q.track]||IMGS.meat;
  const menuHtml=COURSES.map(([k,l])=>{
    const items=(q.dishes||[]).filter(d=>d.course===k);
    return items.length?`<div class="course"><b>${l}</b>${items.map(d=>`<div class="d">${esc(d.name)}</div>`).join('')}</div>`:'';
  }).join('');

  app.innerHTML=`
    <div class="top">${LOGO}<div class="tag">אירועים על הגג</div></div>
    <div class="hero"><img src="${img.hero}" alt="Paseo rooftop">
      <div class="hero-cap"><b>${esc(q.client_name)||'הצעת מחיר'}</b></div>
      <button class="pdf-btn" id="pdf-btn">📄 PDF</button></div>

    <div class="wrap">
      <p class="intro">חוויה אחת בלתי נשכחת על גג הים 🌅<br>בחרתם את החבילה ואת המנות — <b>ואנחנו דואגים לכל השאר.</b></p>

      <div class="card">
        <div class="ev-h">${esc(q.client_name)||'הצעת מחיר'}</div>
        <div class="ev-sub">${[esc(q.event_type),(g?g+' סועדים':''),(q.event_date?fmtDate(q.event_date):'')].filter(Boolean).join(' · ')}</div>
        <span class="ev-pkg">${TRACKS[q.track]||''} · ${PKG[q.package]||''} · ${money(q.per_person)} לאדם</span>
      </div>

      ${menuHtml?`<div class="card"><div class="sec-t">התפריט שלכם</div>${menuHtml}
        <div class="gallery">${img.gallery.map(s=>`<img src="${s}" alt="">`).join('')}</div>
      </div>`:''}

      <div class="card">
        <div class="sec-t">פירוט מחיר</div>
        <div class="brk">
          <div><span>${money(q.per_person)} × ${g} סועדים</span><b>${money(base)}</b></div>
          ${ups.map(u=>`<div><span>${esc(u.l)}</span><b>${money(u.amt)}</b></div>`).join('')}
          ${customs.map(c=>`<div><span>${esc(c.l)}</span><b>${money(c.amt)}</b></div>`).join('')}
          ${disc?`<div class="disc"><span>הנחה</span><b>−${money(disc)}</b></div>`:''}
          <div class="tot"><span>סה״כ משוער</span><b>${money(q.total)}</b></div>
        </div>
        <div class="vat">המחירים אינם כוללים מע״מ · ייתכנו התאמות בהתאם לפרטי האירוע</div>
      </div>

      <div class="card"><div class="sec-t">תנאי ההזמנה</div>
        <div class="terms">${TERMS.map(t=>`<div>• ${esc(t)}</div>`).join('')}</div></div>

      <div class="valid">✦ ההצעה בתוקף עד ${fmtDate(q.validity_date)||'—'} ✦</div>
      ${accepted?`<div class="accepted-banner">✓ ההזמנה אושרה ונחתמה${q.accepted_name?` ע״י ${esc(q.accepted_name)}`:''} — ניצור איתכם קשר בהקדם!${q.signature?`<img class="sig-show" src="${q.signature}" alt="חתימה">`:''}</div>`:''}
      <div class="footer">PASEO · Rooftop Lounge &amp; Dining</div>
    </div>

    ${accepted?'':`<div class="cta-bar"><div class="cta-inner">
      <button class="cta-main" id="accept-btn">אישור וחתימה ✓</button>
      <a class="cta-ghost" href="https://wa.me/${VENUE_WA}?text=${encodeURIComponent('היי, יש לי שאלה על הצעת המחיר 🌅')}" target="_blank">שאלות?</a>
    </div></div>

    <div class="sheet-bg" id="sheet-bg"><div class="sheet">
      <h3>אישור וחתימה</h3>
      <p>מילוי השם והחתימה מאשרים את ההזמנה ואת ההסכמה לתנאים 🌅</p>
      <input id="accept-name" placeholder="שם מלא" autocomplete="name">
      <div class="sig-wrap">
        <canvas id="sig" class="sig-canvas"></canvas>
        <span class="sig-hint">חתמו כאן ✍️</span>
      </div>
      <button type="button" class="sig-clear" id="sig-clear">נקה חתימה</button>
      <button class="cta-main" style="width:100%" id="accept-confirm">מאשר/ת וחותם/ת ✓</button>
    </div></div>`}`;

  const pdf=document.getElementById('pdf-btn');if(pdf)pdf.onclick=()=>window.print();
  if(!accepted){
    const bg=document.getElementById('sheet-bg');
    let sig=null;
    document.getElementById('accept-btn').onclick=()=>{bg.classList.add('open');setTimeout(()=>{sig=setupSig();document.getElementById('accept-name').focus()},60)};
    bg.onclick=e=>{if(e.target===bg)bg.classList.remove('open')};
    document.getElementById('accept-confirm').onclick=async()=>{
      const name=document.getElementById('accept-name').value.trim();
      if(!name){alert('נא למלא שם מלא');return}
      if(!sig||sig.isEmpty()){alert('נא לחתום בתיבת החתימה');return}
      const btn=document.getElementById('accept-confirm');btn.textContent='שולח…';btn.disabled=true;
      const sigData=sig.dataURL();
      const {data,error}=await sb.rpc('crm_quote_accept',{p_token:token,p_name:name,p_signature:sigData,p_terms:TERMS.join('\n')});
      if(error||!data){btn.textContent='מאשר/ת וחותם/ת ✓';btn.disabled=false;alert('אירעה שגיאה, נסו שוב');return}
      q.status='accepted';q.accepted_name=name;q.signature=sigData;render(q);window.scrollTo({top:0,behavior:'smooth'});
    };
  }
}

// signature pad — draw with finger/mouse on a canvas
function setupSig(){
  const c=document.getElementById('sig');if(!c)return null;
  const r=c.getBoundingClientRect();
  c.width=Math.max(1,r.width)*2;c.height=Math.max(1,r.height)*2;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#2b2620';
  let drawing=false,empty=true,last=null;
  const pos=e=>{const b=c.getBoundingClientRect();const t=e.touches&&e.touches[0]?e.touches[0]:e;return{x:t.clientX-b.left,y:t.clientY-b.top}};
  const start=e=>{drawing=true;last=pos(e);e.preventDefault()};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;if(empty){empty=false;const h=document.querySelector('.sig-hint');if(h)h.style.display='none'}e.preventDefault()};
  const end=()=>{drawing=false};
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',end);
  const clr=document.getElementById('sig-clear');if(clr)clr.onclick=()=>{ctx.clearRect(0,0,c.width,c.height);empty=true};
  return {dataURL:()=>c.toDataURL('image/png'),isEmpty:()=>empty};
}
load();
</script>
</body>
</html>
