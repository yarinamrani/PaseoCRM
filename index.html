<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PASEO · ניהול לידים לאירועים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* ===== PASEO Brand Tokens ===== */
    --bg:#0c0e12; --bg-soft:#11141a; --panel:#161a21; --panel-2:#1d222b; --panel-3:#252a35;
    --line:#272d38; --line-soft:#1f242d;
    --txt:#e8eaed; --txt-2:#c5c9d0; --muted:#8b93a1; --muted-2:#6c7380;
    --gold:#c9a227; --gold-2:#d9b441; --gold-dim:#9a7d1e; --gold-soft:rgba(201,162,39,.12);
    --ok:#2ecc71; --warn:#e67e22; --danger:#e74c3c; --info:#4a90d9;
    /* status colors */
    --st-new:#4a90d9; --st-contacted:#9b59b6; --st-meeting:#e67e22; --st-offer:#16a085;
    --st-neg:#f1c40f; --st-won:#2ecc71; --st-lost:#7f8c8d; --st-followup:#5d6d7e;
    /* relevance */
    --rel-yes:#2ecc71; --rel-no:#7f8c8d; --rel-unk:#8b93a1;
    --radius:12px; --radius-lg:16px; --shadow:0 8px 32px rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;
    background-image:radial-gradient(circle at 0% 0%,rgba(201,162,39,.05),transparent 35%),
                     radial-gradient(circle at 100% 100%,rgba(74,144,217,.03),transparent 40%);}
  .serif{font-family:'Frank Ruhl Libre',serif;letter-spacing:.5px}
  button,input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--panel-3);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--line)}

  /* ===== Layout ===== */
  #app{display:flex;flex-direction:column;height:100vh}
  header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;
    border-bottom:1px solid var(--line);background:rgba(12,14,18,.92);backdrop-filter:blur(12px);z-index:50;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:14px;color:var(--gold)}
  .brand .logo-sm{height:42px;width:auto;display:block}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding-right:12px;border-right:1px solid var(--line)}
  .header-r{display:flex;align-items:center;gap:14px}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:pulse 2.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .add-lead-btn{background:var(--gold);color:#1a1206;border:none;border-radius:9px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
  .add-lead-btn:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,162,39,.3)}

  /* ===== Source tabs ===== */
  .src-tabs{display:flex;gap:4px;padding:12px 24px 0;border-bottom:1px solid var(--line-soft);flex-shrink:0;overflow-x:auto}
  .src-tab{background:transparent;border:none;color:var(--muted);padding:10px 18px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:8px;position:relative;transition:color .15s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
  .src-tab:hover{color:var(--txt-2)}
  .src-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
  .src-tab .tab-cnt{background:var(--panel-3);color:var(--muted);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:600;min-width:20px;text-align:center}
  .src-tab.on .tab-cnt{background:var(--gold-soft);color:var(--gold)}

  /* ===== Add Lead Modal ===== */
  .add-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);width:min(560px,92vw);max-height:88vh;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-lg);z-index:95;display:flex;flex-direction:column;box-shadow:var(--shadow);opacity:0;animation:modalIn .18s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes modalIn{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .add-modal .add-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:start;gap:12px;background:linear-gradient(180deg,rgba(201,162,39,.04),transparent)}
  .add-title{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:3px}
  .add-sub{font-size:12px;color:var(--muted)}
  .add-modal .close{background:transparent;border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .add-modal .close:hover{border-color:var(--danger);color:var(--danger)}
  .add-body{flex:1;overflow-y:auto;padding:18px 22px}
  .add-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--panel)}
  .btn-primary{background:var(--gold);color:#1a1206;border:none;padding:10px 22px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--gold-2)}
  .btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--line);padding:10px 18px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{color:var(--txt);border-color:var(--line)}

  /* ===== Stats ===== */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 24px 0;flex-shrink:0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
  .stat::before{content:'';position:absolute;inset:0 auto 0 0;width:2px;background:var(--gold)}
  .stat .n{font-size:24px;font-weight:800;line-height:1.1;font-family:'Frank Ruhl Libre',serif}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.5px}

  /* ===== Toolbar ===== */
  .toolbar{display:flex;gap:8px;align-items:center;padding:14px 24px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--line-soft)}
  .search{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:13px;transition:border-color .15s}
  .search:focus{outline:none;border-color:var(--gold-dim);background:var(--panel-2)}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;cursor:pointer;transition:all .15s}
  .pill:hover{background:var(--panel-2)}
  .pill option{background:var(--panel-2)}
  .views{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .views button{background:none;border:none;color:var(--muted);padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .views button.active{background:var(--gold);color:#1a1206}
  .views button:hover:not(.active){color:var(--txt)}

  /* ===== Main content area ===== */
  .main{flex:1;overflow:hidden;position:relative}
  .content{height:100%;overflow:auto;padding:14px 24px 24px}

  /* ===== Kanban ===== */
  .board{display:flex;gap:12px;height:100%;align-items:flex-start;padding-bottom:8px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);width:280px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
  .col-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .col-head .label{display:flex;align-items:center;gap:8px}
  .col-head .swatch{width:8px;height:8px;border-radius:50%}
  .col-head .cnt{background:var(--panel-3);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:50px}
  .col.dragover .col-body{background:var(--gold-soft);outline:2px dashed var(--gold-dim);outline-offset:-6px;border-radius:8px}

  /* ===== Lead card ===== */
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;transition:all .15s;position:relative;border-right:3px solid var(--st-new)}
  .card:hover{border-color:var(--gold-dim);background:var(--panel-3);transform:translateY(-1px)}
  .card.dragging{opacity:.5}
  .card.irrelevant{opacity:.5}
  .card.irrelevant::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0,transparent 8px,rgba(127,140,141,.08) 8px,rgba(127,140,141,.08) 9px);border-radius:10px;pointer-events:none}
  .card .name{font-weight:700;font-size:14px;color:var(--txt);margin-bottom:6px;display:flex;justify-content:space-between;align-items:start;gap:6px}
  .card .name .urgent{background:var(--warn);color:#1a1206;font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;letter-spacing:.5px}
  .card .row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-top:3px}
  .card .row .ico{opacity:.7;width:14px;text-align:center}
  .card .footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
  .card .badges{display:flex;gap:4px;flex-wrap:wrap}
  .chip{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:500}
  .chip.src-callevent{background:rgba(74,144,217,.18);color:#7fb3e6}
  .chip.src-paseo_form{background:rgba(46,204,113,.18);color:#6fdca0}
  .chip.src-phone{background:rgba(241,196,15,.18);color:#f5d564}
  .chip.hostess{background:rgba(155,89,182,.16);color:#c393db}
  .chip.assigned{background:var(--gold-soft);color:var(--gold-2)}
  .days{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
  .days.soon{color:var(--warn);background:rgba(230,126,34,.12)}
  .days.today{color:#fff;background:var(--warn)}
  .days.past{color:var(--muted-2);background:rgba(127,140,141,.1)}
  .days.future{color:var(--muted)}

  /* ===== Table view ===== */
  .tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:var(--panel-2);position:sticky;top:0;z-index:5}
  th{text-align:right;padding:11px 14px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--gold)}
  th .arr{opacity:.5;margin-right:4px;font-size:10px}
  td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr.irrelevant{opacity:.5}
  tr.urgent td:first-child{border-right:3px solid var(--warn)}
  tr.today td:first-child{border-right:3px solid var(--danger)}
  td b{color:var(--txt)}
  td a{color:var(--gold);text-decoration:none}
  td a:hover{text-decoration:underline}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;background:var(--panel-3);color:var(--txt-2)}
  .status-pill .dot{width:6px;height:6px;border-radius:50%}
  .rel-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
  .rel-yes{background:rgba(46,204,113,.15);color:var(--ok)}
  .rel-no{background:rgba(127,140,141,.15);color:var(--muted)}
  .rel-unk{background:rgba(139,147,161,.12);color:var(--muted)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;opacity:.6}
  tr:hover .row-actions{opacity:1}
  .icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;font-size:14px;transition:all .15s}
  .icon-btn:hover{background:var(--panel-3);color:var(--txt)}
  .icon-btn.del:hover{color:var(--danger)}

  /* ===== Detail panel (slide-in) ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .detail{position:fixed;top:0;bottom:0;left:0;width:520px;max-width:95vw;background:var(--bg-soft);border-right:1px solid var(--line);z-index:90;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .detail.open{transform:translateX(0)}
  .detail-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:start;gap:10px;flex-shrink:0;background:linear-gradient(180deg,rgba(201,162,39,.04),transparent)}
  .detail-head .who{flex:1;min-width:0}
  .detail-head h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:700;margin-bottom:3px;line-height:1.2}
  .detail-head .meta-line{font-size:12px;color:var(--muted)}
  .detail-head .close{background:transparent;border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .detail-head .close:hover{border-color:var(--danger);color:var(--danger)}
  .detail-body{flex:1;overflow-y:auto;padding:18px 20px}
  .detail-foot{padding:12px 20px;border-top:1px solid var(--line);background:var(--panel);flex-shrink:0}
  .save-bar{width:100%;border:none;border-radius:9px;padding:11px;font-family:inherit;font-weight:700;font-size:13px;cursor:default;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;background:var(--panel-3);color:var(--muted)}
  .save-bar .save-ico{font-size:14px;line-height:1}
  .save-bar.dirty{background:var(--gold);color:#1a1206;cursor:pointer;animation:savePulse 1.6s ease-in-out infinite}
  .save-bar.dirty:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,162,39,.3)}
  .save-bar.saving{background:var(--panel-3);color:var(--gold);cursor:wait;animation:none}
  @keyframes savePulse{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.5)}50%{box-shadow:0 0 0 6px rgba(201,162,39,0)}}
  .detail-section{margin-bottom:22px}
  .detail-section .sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:6px}
  .detail-section .sec-title::after{content:'';flex:1;height:1px;background:var(--line-soft)}

  .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .field.full{grid-column:1/-1}
  .field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;font-family:inherit;outline:none;padding:0;resize:none}
  .field textarea{min-height:60px;line-height:1.5}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted-2)}
  .field:focus-within{border-color:var(--gold-dim);background:var(--panel-2)}
  .field.readonly{opacity:.7}
  .field .val{font-size:13px;color:var(--txt);font-weight:500;line-height:1.5;word-break:break-word}
  .field .val.empty{color:var(--muted-2);font-weight:400;font-style:italic}
  .field .val a{color:var(--gold);text-decoration:none}

  .quick-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .qa{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 14px;border-radius:9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
  .qa:hover{background:var(--panel-2);border-color:var(--gold-dim)}
  .qa.wa:hover{border-color:#25d366;color:#25d366}
  .qa.call:hover{border-color:var(--info);color:var(--info)}
  .qa.del{margin-right:auto;border-color:transparent}
  .qa.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(231,76,60,.08)}

  /* status & relevance selectors */
  .sel-row{display:flex;gap:8px;flex-wrap:wrap}
  .sel-row .seg{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:4px;display:flex;gap:2px;min-width:0}
  .sel-row .seg button{flex:1;background:transparent;border:none;color:var(--muted);padding:7px 6px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
  .sel-row .seg button:hover{color:var(--txt)}
  .sel-row .seg button.on{background:var(--gold);color:#1a1206}
  .sel-row .seg.rel button.on{background:var(--ok);color:#0a1f12}
  .sel-row .seg.rel button.on.no{background:var(--lost);color:#fff}
  .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:4px}
  .status-grid button{background:transparent;border:none;color:var(--muted);padding:8px 4px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
  .status-grid button:hover{color:var(--txt);background:var(--panel-2)}
  .status-grid button.on{color:#fff}
  .status-grid button .dot{width:6px;height:6px;border-radius:50%}

  /* activities timeline */
  .activity-add{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:14px}
  .act-kinds{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
  .act-kinds button{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:600}
  .act-kinds button.on{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .act-kinds button:hover:not(.on){color:var(--txt)}
  .activity-add textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--txt);font-size:12px;font-family:inherit;resize:vertical;min-height:50px;outline:none}
  .activity-add textarea:focus{border-color:var(--gold-dim)}
  .activity-add .submit-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .activity-add .submit-row .who-select{background:var(--panel-2);border:1px solid var(--line);color:var(--txt-2);padding:5px 8px;border-radius:6px;font-size:11px}
  .add-btn{background:var(--gold);color:#1a1206;border:none;padding:7px 16px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}
  .add-btn:hover{background:var(--gold-2)}
  .add-btn:disabled{opacity:.5;cursor:not-allowed}
  .timeline{display:flex;flex-direction:column;gap:8px}
  .activity{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 12px;position:relative}
  .activity .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px}
  .activity .kind{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--txt-2);text-transform:uppercase;letter-spacing:.5px}
  .activity .when{font-size:10px;color:var(--muted)}
  .activity .body{font-size:13px;color:var(--txt);line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .activity .actor{font-size:10px;color:var(--gold);margin-top:5px}
  .timeline-empty{text-align:center;color:var(--muted-2);padding:24px;font-size:12px;font-style:italic}

  /* ===== Calendar (kept) ===== */
  .calwrap{padding:0}
  .calnav{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .calnav button{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px}
  .calnav button:hover{background:var(--panel-2)}
  .calnav h3{font-family:'Frank Ruhl Libre',serif;font-size:20px;color:var(--gold)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calhd{text-align:center;color:var(--muted);font-size:11px;font-weight:600;padding:6px;text-transform:uppercase;letter-spacing:.5px}

  ];

    ${t.l} <span class="tab-cnt">${counts[t.k]}</span>
  </button>`).join('');
  $$('.src-tab',el).forEach(b=>b.onclick=()=>{sourceTab=b.dataset.src;draw()});

// ===== Filter pipeline =====
function inTimeframe(l){
  if(!filters.timeframe)return true;
  const n=daysUntil(l.event_date);
  if(n==null)return filters.timeframe==='past'?false:false;
  if(filters.timeframe==='week')return n>=0&&n<=7;
  if(filters.timeframe==='month')return n>=0&&n<=30;
  if(filters.timeframe==='future')return n>=0;
  if(filters.timeframe==='past')return n<0;
  return true;
}
function filtered(){
  let arr=LEADS.filter(l=>{
    if(sourceTab!=='all'&&l.source!==sourceTab)return false;
    if(filters.status&&l.status!==filters.status)return false;
    if(filters.relevance&&l.relevance!==filters.relevance)return false;
    if(filters.source&&l.source!==filters.source)return false;
    if(filters.assigned){
      if(filters.assigned==='__none'&&l.assigned_to)return false;
      else if(filters.assigned!=='__none'&&l.assigned_to!==filters.assigned)return false;
    }
    if(!inTimeframe(l))return false;
    if(search){
      const h=[l.full_name,l.phone,l.email,l.event_type,l.notes,l.event_date_raw,l.hostess].filter(Boolean).join(' ').toLowerCase();
      if(!h.includes(search))return false;
    }
    return true;
  });
  // sort
  arr.sort((a,b)=>{
    let va=a[sortBy],vb=b[sortBy];
    if(va==null&&vb==null)return 0; if(va==null)return 1; if(vb==null)return -1;
    if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase()}
    return (sortDir==='asc'?1:-1)*(va<vb?-1:va>vb?1:0);
  });
  return arr;
}

// ===== Stats =====
function drawStats(){
  const visible=filtered();
  const active=visible.filter(l=>!['won','lost'].includes(l.status)&&l.relevance!=='irrelevant').length;
  const week=visible.filter(l=>{const n=daysUntil(l.event_date);return n!=null&&n>=0&&n<=7}).length;
  const month=visible.filter(l=>{const n=daysUntil(l.event_date);return n!=null&&n>=0&&n<=30}).length;
  const won=visible.filter(l=>l.status==='won').length;
  const totalQual=visible.filter(l=>l.relevance!=='irrelevant').length;
  const conv=totalQual?Math.round(won/totalQual*100):0;
  $('#stats').innerHTML=`
    <div class="stat"><div class="n">${active}</div><div class="l">לידים פעילים</div></div>
    <div class="stat"><div class="n">${week}</div><div class="l">השבוע</div></div>
    <div class="stat"><div class="n">${month}</div><div class="l">החודש</div></div>
    <div class="stat"><div class="n">${won}</div><div class="l">נסגרו</div></div>
    <div class="stat"><div class="n">${conv}%</div><div class="l">המרה</div></div>`;
}

// ===== Draw dispatcher =====
function draw(){
  drawSourceTabs();

}

// ===== Calendar =====
function drawCalendar(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const evs={};
  filtered().forEach(l=>{
    if(!l.event_date)return;
    const d=new Date(l.event_date);
    if(d.getFullYear()===y&&d.getMonth()===m){
      const dy=d.getDate();(evs[dy]=evs[dy]||[]).push(l);
    }
  });
  let cells='';
  for(let i=0;i<first;i++)cells+='<div class="calcell empty"></div>';
  for(let d=1;d<=days;d++){
    const ev=(evs[d]||[]).map(l=>`<div class="calev" data-id="${l.id}" title="${esc(l.full_name)} · ${esc(l.event_type||'')}">${esc(l.full_name||'אירוע')}</div>`).join('');
    cells+=`<div class="calcell"><div class="d">${d}</div>${ev}</div>`;
  }
  $('#main').innerHTML=`<div class="calwrap">
    <div class="calnav"><button id="pm">‹ קודם</button><h3 class="serif">${MONTHS[m]} ${y}</h3><button id="nm">הבא ›</button><button id="tm">היום</button></div>
    <div class="calgrid">${DAYS.map(d=>`<div class="calhd">${d}</div>`).join('')}${cells}</div></div>`;
  $('#pm').onclick=()=>{calRef=new Date(y,m-1,1);drawCalendar()};
  $('#nm').onclick=()=>{calRef=new Date(y,m+1,1);drawCalendar()};
  $('#tm').onclick=()=>{calRef=new Date();drawCalendar()};
  $$('.calev').forEach(e=>e.onclick=()=>openDetail(e.dataset.id));
}

    actDraft.kind=b.dataset.ak;
    $$('.act-kinds button',el).forEach(x=>x.classList.toggle('on',x===b));
    const ph={call:'מה דובר בשיחה?',meeting:'סיכום הפגישה',message:'תוכן ההודעה',email:'תוכן/נושא המייל',note:'הערה'}[actDraft.kind]||'תיאור...';
    $('#x-act-body',el).placeholder=ph;
  });
  $('#x-act-body',el).oninput=e=>{actDraft.body=e.target.value};
  $('#x-act-actor',el).onchange=e=>{actDraft.actor=e.target.value};
  $('#x-act-add',el).onclick=()=>{
    if(!actDraft.body.trim())return;
    addActivity(l.id,actDraft.kind,actDraft.body,actDraft.actor);
  };
}
function actHTML(a){
  const k=ACT_KIND_MAP[a.kind]||{ico:'●',l:a.kind};
  const isSys=a.kind==='status_change';
  return `<div class="activity"${isSys?' style="background:var(--bg-soft);border-style:dashed"':''}>
    <div class="head">
      <div class="kind">${k.ico} ${k.l}</div>
      <div class="when">${fmtRel(a.created_at)}</div>
    </div>
    <div class="body">${esc(a.body)}</div>
    ${a.actor&&!isSys?`<div class="actor">— ${esc(a.actor)}</div>`:''}
  </div>`;
}

// ===== Add Lead Modal =====
function drawAddModal(){
  let m=document.querySelector('.add-modal');
  if(!showAddModal){
    if(m)m.remove();
    $('#scrim').classList.remove('open');
    return;
  }
  $('#scrim').classList.add('open');
  if(!m){
    m=document.createElement('div');
    m.className='add-modal';
    document.body.appendChild(m);
  }
  m.innerHTML=`
    <div class="add-head">
      <div>
        <div class="add-title serif">ליד חדש</div>
        <div class="add-sub">ליד טלפוני שהגיע ממארחת</div>
      </div>
      <button class="close" id="add-x">✕</button>
    </div>
    <div class="add-body">
      <div class="fields">
        <div class="field"><label>שם מלא *</label><input id="a-full_name" value="${esc(addDraft.full_name)}" placeholder="ישראל ישראלי" autofocus /></div>
        <div class="field"><label>טלפון *</label><input id="a-phone" value="${esc(addDraft.phone)}" placeholder="054-1234567" type="tel" /></div>
        <div class="field full"><label>מארחת שקיבלה את השיחה</label><input id="a-hostess" value="${esc(addDraft.hostess)}" placeholder="שם המארחת" /></div>
        <div class="field"><label>סוג אירוע</label><input id="a-event_type" value="${esc(addDraft.event_type)}" placeholder="יום הולדת / בר מצווה..." /></div>
        <div class="field"><label>תאריך אירוע</label><input id="a-event_date" value="${addDraft.event_date}" type="date" /></div>
        <div class="field"><label>שעת אירוע</label><input id="a-event_time" value="${esc(addDraft.event_time)}" placeholder="20:00" /></div>
        <div class="field"><label>כמות אורחים</label><input id="a-guests_raw" value="${esc(addDraft.guests_raw)}" placeholder="50 / 30-50" /></div>
        <div class="field full"><label>הערות (מה הלקוח אמר?)</label><textarea id="a-notes" placeholder="פרטים נוספים מהשיחה...">${esc(addDraft.notes)}</textarea></div>
      </div>
    </div>
    <div class="add-foot">
      <button class="btn-secondary" id="add-cancel">ביטול</button>
      <button class="btn-primary" id="add-save">צור ליד</button>
    </div>`;

  // bindings
  const bind=(id,k)=>{const e=$('#'+id,m);if(e)e.oninput=ev=>addDraft[k]=ev.target.value};
  bind('a-full_name','full_name');
  bind('a-phone','phone');
  bind('a-hostess','hostess');
  bind('a-event_type','event_type');
  bind('a-event_date','event_date');
  bind('a-event_time','event_time');
  bind('a-guests_raw','guests_raw');
  bind('a-notes','notes');

  const closeModal=()=>{showAddModal=false;drawAddModal()};
  $('#add-x',m).onclick=closeModal;
  $('#add-cancel',m).onclick=closeModal;
  $('#add-save',m).onclick=createLead;
}

init();
</script>
</body>
</html>
