<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'" />
<title>PASEO · ניהול לידים לאירועים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* ===== PASEO Brand Tokens ===== */
    --bg:#0c0e12; --bg-soft:#11141a; --panel:#161a21; --panel-2:#1d222b; --panel-3:#252a35;
    --line:#272d38; --line-soft:#1f242d;
    --txt:#e8eaed; --txt-2:#c5c9d0; --muted:#8b93a1; --muted-2:#6c7380;
    --gold:#c9a227; --gold-2:#d9b441; --gold-dim:#9a7d1e; --gold-soft:rgba(201,162,39,.12);
    --ok:#2ecc71; --warn:#e67e22; --danger:#e74c3c; --info:#4a90d9;
    /* status colors */
    --st-new:#4a90d9; --st-contacted:#9b59b6; --st-meeting:#e67e22; --st-offer:#16a085;
    --st-neg:#f1c40f; --st-won:#2ecc71; --st-lost:#7f8c8d; --st-followup:#5d6d7e;
    /* relevance */
    --rel-yes:#2ecc71; --rel-no:#7f8c8d; --rel-unk:#8b93a1;
    --radius:12px; --radius-lg:16px; --shadow:0 8px 32px rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;
    background-image:radial-gradient(circle at 0% 0%,rgba(201,162,39,.05),transparent 35%),
                     radial-gradient(circle at 100% 100%,rgba(74,144,217,.03),transparent 40%);}
  .serif{font-family:'Frank Ruhl Libre',serif;letter-spacing:.5px}
  button,input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--panel-3);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--line)}

  /* ===== Layout ===== */
  #app{display:flex;flex-direction:column;height:100vh}
  header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;
    border-bottom:1px solid var(--line);background:rgba(12,14,18,.92);backdrop-filter:blur(12px);z-index:50;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:14px;color:var(--gold)}
  .brand .logo-sm{height:42px;width:auto;display:block}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding-right:12px;border-right:1px solid var(--line)}
  .header-r{display:flex;align-items:center;gap:14px}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:pulse 2.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .add-lead-btn{background:var(--gold);color:#1a1206;border:none;border-radius:9px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
  .add-lead-btn:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,162,39,.3)}

  /* ===== Source tabs ===== */
  .src-tabs{display:flex;gap:4px;padding:12px 24px 0;border-bottom:1px solid var(--line-soft);flex-shrink:0;overflow-x:auto}
  .src-tab{background:transparent;border:none;color:var(--muted);padding:10px 18px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:8px;position:relative;transition:color .15s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
  .src-tab:hover{color:var(--txt-2)}
  .src-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
  .src-tab .tab-cnt{background:var(--panel-3);color:var(--muted);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:600;min-width:20px;text-align:center}
  .src-tab.on .tab-cnt{background:var(--gold-soft);color:var(--gold)}

  /* ===== Add Lead Modal ===== */
  .add-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);width:min(560px,92vw);max-height:88vh;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-lg);z-index:95;display:flex;flex-direction:column;box-shadow:var(--shadow);opacity:0;animation:modalIn .18s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes modalIn{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .add-modal .add-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:start;gap:12px;background:linear-gradient(180deg,rgba(201,162,39,.04),transparent)}
  .add-title{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:3px}
  .add-sub{font-size:12px;color:var(--muted)}
  .add-modal .close{background:transparent;border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .add-modal .close:hover{border-color:var(--danger);color:var(--danger)}
  .add-body{flex:1;overflow-y:auto;padding:18px 22px}
  .add-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--panel)}
  .btn-primary{background:var(--gold);color:#1a1206;border:none;padding:10px 22px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--gold-2)}
  .btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--line);padding:10px 18px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{color:var(--txt);border-color:var(--line)}

  /* ===== Stats ===== */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 24px 0;flex-shrink:0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
  .stat::before{content:'';position:absolute;inset:0 auto 0 0;width:2px;background:var(--gold)}
  .stat .n{font-size:24px;font-weight:800;line-height:1.1;font-family:'Frank Ruhl Libre',serif}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.5px}

  /* ===== Toolbar ===== */
  .toolbar{display:flex;gap:8px;align-items:center;padding:14px 24px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--line-soft)}
  .search{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:13px;transition:border-color .15s}
  .search:focus{outline:none;border-color:var(--gold-dim);background:var(--panel-2)}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;cursor:pointer;transition:all .15s}
  .pill:hover{background:var(--panel-2)}
  .pill option{background:var(--panel-2)}

  /* ===== Custom Dropdown ===== */
  .dd{position:relative;flex-shrink:0}
  .dd-trigger{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
  .dd-trigger:hover{background:var(--panel-2);border-color:var(--line)}
  .dd-trigger.active{border-color:var(--gold-dim);background:var(--gold-soft);color:var(--gold-2)}
  .dd-trigger .dd-arrow{font-size:10px;opacity:.6;transition:transform .15s}
  .dd.open .dd-trigger .dd-arrow{transform:rotate(180deg)}
  .dd.open .dd-trigger{border-color:var(--gold-dim);background:var(--panel-2)}
  .dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dd-dot-empty{width:8px;height:8px;flex-shrink:0}
  .dd-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:180px;max-height:320px;overflow-y:auto;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;z-index:60;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:all .15s;transform-origin:top right}
  .dd.open .dd-menu{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .dd-opt{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;color:var(--txt-2);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .12s;text-align:right}
  .dd-opt:hover{background:var(--panel-3);color:var(--txt)}
  .dd-opt.sel{background:var(--gold-soft);color:var(--gold-2);font-weight:600}
  .dd-opt .dd-check{margin-right:auto;color:var(--gold);font-size:12px}

  .views{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .views button{background:none;border:none;color:var(--muted);padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .views button.active{background:var(--gold);color:#1a1206}
  .views button:hover:not(.active){color:var(--txt)}

  /* ===== Main content area ===== */
  .main{flex:1;overflow:hidden;position:relative}
  .content{height:100%;overflow:auto;padding:14px 24px 24px}

  /* ===== Kanban ===== */
  .board{display:flex;gap:12px;height:100%;align-items:flex-start;padding-bottom:8px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);width:280px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
  .col-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .col-head .label{display:flex;align-items:center;gap:8px}
  .col-head .swatch{width:8px;height:8px;border-radius:50%}
  .col-head .cnt{background:var(--panel-3);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:50px}
  .col.dragover .col-body{background:var(--gold-soft);outline:2px dashed var(--gold-dim);outline-offset:-6px;border-radius:8px}

  /* ===== Lead card ===== */
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;transition:all .15s;position:relative;border-right:3px solid var(--st-new)}
  .card:hover{border-color:var(--gold-dim);background:var(--panel-3);transform:translateY(-1px)}
  .card.dragging{opacity:.5}
  .card.irrelevant{opacity:.5}
  .card.irrelevant::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0,transparent 8px,rgba(127,140,141,.08) 8px,rgba(127,140,141,.08) 9px);border-radius:10px;pointer-events:none}
  .card .name{font-weight:700;font-size:14px;color:var(--txt);margin-bottom:6px;display:flex;justify-content:space-between;align-items:start;gap:6px}
  .card .name .urgent{background:var(--warn);color:#1a1206;font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;letter-spacing:.5px}
  .card .row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-top:3px}
  .card .row .ico{opacity:.7;width:14px;text-align:center}
  .card .footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
  .card .badges{display:flex;gap:4px;flex-wrap:wrap}
  .chip{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:500}
  .chip.src-callevent{background:rgba(74,144,217,.18);color:#7fb3e6}
  .chip.src-paseo_form{background:rgba(46,204,113,.18);color:#6fdca0}
  .chip.src-phone{background:rgba(241,196,15,.18);color:#f5d564}
  .chip.hostess{background:rgba(155,89,182,.16);color:#c393db}
  .chip.assigned{background:var(--gold-soft);color:var(--gold-2)}
  .days{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
  .days.soon{color:var(--warn);background:rgba(230,126,34,.12)}
  .days.today{color:#fff;background:var(--warn)}
  .days.past{color:var(--muted-2);background:rgba(127,140,141,.1)}
  .days.future{color:var(--muted)}

  /* ===== Table view ===== */
  .tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:var(--panel-2);position:sticky;top:0;z-index:5}
  th{text-align:right;padding:11px 14px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--gold)}
  th .arr{opacity:.5;margin-right:4px;font-size:10px}
  td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr.irrelevant{opacity:.5}
  tr.urgent td:first-child{border-right:3px solid var(--warn)}
  tr.today td:first-child{border-right:3px solid var(--danger)}
  td b{color:var(--txt)}
  td a{color:var(--gold);text-decoration:none}
  td a:hover{text-decoration:underline}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;background:var(--panel-3);color:var(--txt-2)}
  .status-pill .dot{width:6px;height:6px;border-radius:50%}
  .rel-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
  .rel-yes{background:rgba(46,204,113,.15);color:var(--ok)}
  .rel-no{background:rgba(127,140,141,.15);color:var(--muted)}
  .rel-unk{background:rgba(139,147,161,.12);color:var(--muted)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;opacity:.6}
  tr:hover .row-actions{opacity:1}
  .icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;font-size:14px;transition:all .15s}
  .icon-btn:hover{background:var(--panel-3);color:var(--txt)}
  .icon-btn.del:hover{color:var(--danger)}

  /* ===== Detail panel (slide-in) ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .detail{position:fixed;top:0;bottom:0;left:0;width:520px;max-width:95vw;background:var(--bg-soft);border-right:1px solid var(--line);z-index:90;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .detail.open{transform:translateX(0)}
  .detail-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:start;gap:10px;flex-shrink:0;background:linear-gradient(180deg,rgba(201,162,39,.04),transparent)}
  .detail-head .who{flex:1;min-width:0}
  .detail-head h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:700;margin-bottom:3px;line-height:1.2}
  .detail-head .meta-line{font-size:12px;color:var(--muted)}
  .detail-head .close{background:transparent;border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .detail-head .close:hover{border-color:var(--danger);color:var(--danger)}
  .detail-body{flex:1;overflow-y:auto;padding:18px 20px}
  .detail-foot{padding:12px 20px;border-top:1px solid var(--line);background:var(--panel);flex-shrink:0}
  .save-bar{width:100%;border:none;border-radius:9px;padding:11px;font-family:inherit;font-weight:700;font-size:13px;cursor:default;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;background:var(--panel-3);color:var(--muted)}
  .save-bar .save-ico{font-size:14px;line-height:1}
  .save-bar.dirty{background:var(--gold);color:#1a1206;cursor:pointer;animation:savePulse 1.6s ease-in-out infinite}
  .save-bar.dirty:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,162,39,.3)}
  .save-bar.saving{background:var(--panel-3);color:var(--gold);cursor:wait;animation:none}
  @keyframes savePulse{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.5)}50%{box-shadow:0 0 0 6px rgba(201,162,39,0)}}
  .detail-section{margin-bottom:22px}
  .detail-section .sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:6px}
  .detail-section .sec-title::after{content:'';flex:1;height:1px;background:var(--line-soft)}

  .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .field.full{grid-column:1/-1}
  .field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;font-family:inherit;outline:none;padding:0;resize:none}
  .field textarea{min-height:60px;line-height:1.5}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted-2)}
  .field:focus-within{border-color:var(--gold-dim);background:var(--panel-2)}
  .field.readonly{opacity:.7}
  .field .val{font-size:13px;color:var(--txt);font-weight:500;line-height:1.5;word-break:break-word}
  .field .val.empty{color:var(--muted-2);font-weight:400;font-style:italic}
  .field .val a{color:var(--gold);text-decoration:none}

  .quick-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .menu-actions{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:18px}
  .menu-actions-label{font-size:11px;color:var(--muted);margin-bottom:9px;font-weight:600}
  .menu-actions-btns{display:flex;gap:8px}
  .menu-btn{flex:1;justify-content:center;border-color:var(--line)}
  .menu-btn.dairy:hover{border-color:#6fdca0;color:#6fdca0}
  .menu-btn.meat:hover{border-color:#e0816a;color:#e0816a}
  .qa{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 14px;border-radius:9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
  .qa:hover{background:var(--panel-2);border-color:var(--gold-dim)}
  .qa.wa:hover{border-color:#25d366;color:#25d366}
  .qa.call:hover{border-color:var(--info);color:var(--info)}
  .qa.del{margin-right:auto;border-color:transparent}
  .qa.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(231,76,60,.08)}

  /* status & relevance selectors */
  .sel-row{display:flex;gap:8px;flex-wrap:wrap}
  .sel-row .seg{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:4px;display:flex;gap:2px;min-width:0}
  .sel-row .seg button{flex:1;background:transparent;border:none;color:var(--muted);padding:7px 6px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
  .sel-row .seg button:hover{color:var(--txt)}
  .sel-row .seg button.on{background:var(--gold);color:#1a1206}
  .sel-row .seg.rel button.on{background:var(--ok);color:#0a1f12}
  .sel-row .seg.rel button.on.no{background:var(--lost);color:#fff}
  .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:4px}
  .status-grid button{background:transparent;border:none;color:var(--muted);padding:8px 4px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
  .status-grid button:hover{color:var(--txt);background:var(--panel-2)}
  .status-grid button.on{color:#fff}
  .status-grid button .dot{width:6px;height:6px;border-radius:50%}

  /* activities timeline */
  .activity-add{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:14px}
  .act-kinds{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}

const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const e=new Date(d);return Math.round((e-t)/864e5)}
function daysLabel(d){
  const n=daysUntil(d);if(n==null)return '';
  if(n<0)return `<span class="days past">עבר ${-n}י</span>`;
  if(n===0)return `<span class="days today">היום</span>`;
  if(n<=7)return `<span class="days soon">${n}י</span>`;
  if(n<=30)return `<span class="days future">${n}י</span>`;
  return `<span class="days future">${n}י</span>`;
}
function fmtDate(d){if(!d)return '';return d.split('-').reverse().join('.')}
function fmtRel(ts){
  if(!ts)return '';
  const d=new Date(ts),n=new Date(),diff=(n-d)/1000;
  if(diff<60)return 'הרגע';
  if(diff<3600)return Math.floor(diff/60)+' דק׳';
  if(diff<86400)return Math.floor(diff/3600)+' שעות';
  if(diff<604800)return Math.floor(diff/86400)+' ימים';
  return d.toLocaleDateString('he-IL');
}
function dayOfWeek(d){if(!d)return null;return DAYS[new Date(d).getDay()]}
const WA_OPENING_MSG='היי, מדברים מהפסאו 🌅 ראיתי שהשארת פרטים בנוגע לאירוע אצלנו. מתי נוח לך שנדבר?';

// ===== Data =====
async function loadLeads(){
  const {data,error}=await sb.from('crm_leads').select('*').order('received_at',{ascending:false});
  if(error){console.error(error);return}
  LEADS=data||[]; draw();
}
async function loadActs(leadId){
  const {data,error}=await sb.from('crm_activities').select('*').eq('lead_id',leadId).order('created_at',{ascending:false});
  if(error){console.error(error);return}
  ACTS[leadId]=data||[]; drawDetail();
}
async function updateLead(id,patch){
  Object.assign(LEADS.find(x=>x.id===id)||{},patch);
  const {error}=await sb.from('crm_leads').update(patch).eq('id',id);
  if(error){console.error(error);showToast('עדכון נכשל: '+error.message);return false}
  draw();return true;
}
async function deleteLead(id){
  const l=LEADS.find(x=>x.id===id);
  const nm=l?(l.full_name||'הליד'):'הליד';
  if(!confirm(`למחוק את "${nm}"? הפעולה אינה הפיכה.`))return;
  const {error}=await sb.from('crm_leads').delete().eq('id',id);
  if(error){showToast('מחיקה נכשלה');return}
  LEADS=LEADS.filter(x=>x.id!==id);
  if(openLeadId===id)closeDetail();
  draw();showToast('הליד נמחק');
}
async function createLead(){
  if(!addDraft.full_name.trim()){showToast('חסר שם');return}
  if(!addDraft.phone.trim()){showToast('חסר טלפון');return}
  const row={
    source:'phone',
    inbox:null,
    full_name:addDraft.full_name.trim(),
    phone:addDraft.phone.trim(),
    event_type:addDraft.event_type.trim()||null,
    event_date:addDraft.event_date||null,
    event_date_raw:addDraft.event_date||null,
    event_time:addDraft.event_time.trim()||null,
    guests_raw:addDraft.guests_raw.trim()||null,
    notes:addDraft.notes.trim()||null,
    hostess:addDraft.hostess.trim()||null,
    raw_body:`נוצר ידנית · מארחת: ${addDraft.hostess||'—'} · ${new Date().toLocaleString('he-IL')}`,
    received_at:new Date().toISOString(),
    status:'new',
    relevance:'relevant'
  };
  // נרמול אורחים
  const nums=(addDraft.guests_raw.match(/\d+/g)||[]).map(Number);
  if(nums.length>=2){row.guests_min=nums[0];row.guests_max=nums[1]}
  else if(nums.length===1){row.guests_min=nums[0];row.guests_max=nums[0]}
  // נרמול טלפון
  let d=row.phone.replace(/[^\d+]/g,'');
  if(d.indexOf('+972')===0)d='0'+d.slice(4);
  if(d.length===10&&d[0]==='0')row.phone=d.slice(0,3)+'-'+d.slice(3);

  const {data,error}=await sb.from('crm_leads').insert(row).select().single();
  if(error){showToast('יצירה נכשלה: '+error.message);return}
  LEADS=[data,...LEADS];
  addDraft={full_name:'',phone:'',event_type:'',event_date:'',event_time:'',guests_raw:'',notes:'',hostess:''};
  showAddModal=false;
  draw();
  showToast('הליד נוסף');
  openDetail(data.id);
}
async function addActivity(leadId,kind,body,actor){
  if(!body.trim())return;
  const row={lead_id:leadId,kind,body:body.trim(),actor};
  const {data,error}=await sb.from('crm_activities').insert(row).select().single();
  if(error){showToast('הוספה נכשלה');return}
  ACTS[leadId]=[data,...(ACTS[leadId]||[])];
  actDraft={kind:'call',body:'',actor};
  drawDetail();showToast('נוסף');
}

  session=data.session;
  if(!session){renderLogin();return}
  renderShell();
  await loadLeads();
  sb.channel('crm-leads').on('postgres_changes',{event:'*',schema:'public',table:'crm_leads'},()=>loadLeads()).subscribe();
  sb.channel('crm-acts').on('postgres_changes',{event:'*',schema:'public',table:'crm_activities'},p=>{
    if(openLeadId&&p.new&&p.new.lead_id===openLeadId)loadActs(openLeadId);
  }).subscribe();
}

// ===== Custom Dropdown =====
function setupDropdown(elId, filterKey, options){
  const el=document.getElementById(elId);if(!el)return;
  const render=()=>{
    const cur=options.find(o=>o.v===filters[filterKey])||options[0];
    const isActive=filters[filterKey]!=='';
    el.innerHTML=`
      <button class="dd-trigger ${isActive?'active':''}" type="button">
        ${cur.c?`<span class="dd-dot" style="background:${cur.c}"></span>`:''}
        <span class="dd-label">${esc(cur.l)}</span>
        <span class="dd-arrow">▾</span>
      </button>
      <div class="dd-menu">
        ${options.map(o=>`<button class="dd-opt ${o.v===filters[filterKey]?'sel':''}" data-v="${esc(o.v)}" type="button">
          ${o.c?`<span class="dd-dot" style="background:${o.c}"></span>`:'<span class="dd-dot-empty"></span>'}
          <span>${esc(o.l)}</span>
          ${o.v===filters[filterKey]?'<span class="dd-check">✓</span>':''}
        </button>`).join('')}
      </div>`;
    const trigger=el.querySelector('.dd-trigger');
    trigger.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const wasOpen=el.classList.contains('open');
      closeAllDropdowns();
      if(!wasOpen)el.classList.add('open');
    });
    el.querySelectorAll('.dd-opt').forEach(opt=>opt.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      filters[filterKey]=opt.dataset.v;
      el.classList.remove('open');
      render();
      draw();
    }));
  };
  render();
}
function closeAllDropdowns(){
  document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));
}

// ===== Export to Excel (CSV + BOM for Hebrew) =====
function exportExcel(){
  const data=filtered();
  if(!data.length){showToast('אין לידים לייצוא');return}
  const headers=['שם','טלפון','אימייל','מקור','סטטוס','רלוונטיות','סוג אירוע','תאריך אירוע','שעה','אורחים','אחראי','מארחת','הערות','התקבל'];
  const srcL={callevent:'Call Event',paseo_form:'טופס אתר',phone:'טלפוני'};
  const rows=data.map(l=>[
    l.full_name||'', l.phone||'', l.email||'',
    srcL[l.source]||l.source||'',
    (STATUS_MAP[l.status]||{}).l||l.status||'',
    (RELEVANCE.find(r=>r.k===l.relevance)||{}).l||'',
    l.event_type||'',
    l.event_date?fmtDate(l.event_date):(l.event_date_raw||''),
    l.event_time||'', l.guests_raw||'',
    l.assigned_to||'', l.hostess||'',
    (l.notes||'').replace(/\n/g,' '),
    l.received_at?new Date(l.received_at).toLocaleDateString('he-IL'):''
  ]);
  const escCsv=v=>{const s=String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=[headers,...rows].map(r=>r.map(escCsv).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const tabName=sourceTab==='all'?'הכל':(srcL[sourceTab]||sourceTab);
  a.href=url;
  a.download=`לידים_פסאו_${tabName}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`יוצאו ${data.length} לידים`);
}

// ===== Filter pipeline =====
function inTimeframe(l){
  if(!filters.timeframe)return true;
  const n=daysUntil(l.event_date);
  if(n==null)return filters.timeframe==='past'?false:false;
  if(filters.timeframe==='week')return n>=0&&n<=7;
  if(filters.timeframe==='month')return n>=0&&n<=30;
  if(filters.timeframe==='future')return n>=0;
  if(filters.timeframe==='past')return n<0;
  return true;
}
function filtered(){
  let arr=LEADS.filter(l=>{
    if(sourceTab!=='all'&&l.source!==sourceTab)return false;
    // לא-רלוונטי מוסתר כברירת מחדל — מופיע רק אם בוחרים אותו ספציפית בפילטר
    if(filters.relevance==='irrelevant'){
      if(l.relevance!=='irrelevant')return false;
    } else {
      if(l.relevance==='irrelevant')return false; // הסתר רעש
      if(filters.relevance&&l.relevance!==filters.relevance)return false;
    }
    if(filters.status&&l.status!==filters.status)return false;
    if(filters.source&&l.source!==filters.source)return false;
    if(filters.assigned){
      if(filters.assigned==='__none'&&l.assigned_to)return false;
      else if(filters.assigned!=='__none'&&l.assigned_to!==filters.assigned)return false;
    }
    if(!inTimeframe(l))return false;
    if(search){
      const h=[l.full_name,l.phone,l.email,l.event_type,l.notes,l.event_date_raw,l.hostess].filter(Boolean).join(' ').toLowerCase();
      if(!h.includes(search))return false;
    }
    return true;
  });
  // sort
  arr.sort((a,b)=>{
    let va=a[sortBy],vb=b[sortBy];
    if(va==null&&vb==null)return 0; if(va==null)return 1; if(vb==null)return -1;
    if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase()}
    return (sortDir==='asc'?1:-1)*(va<vb?-1:va>vb?1:0);
  });
  return arr;
}

// ===== Stats =====
function drawStats(){
  // הסטטיסטיקות מבוססות על הטאב הנוכחי, תמיד מתעלמות מלא-רלוונטיים, ללא תלות בפילטרי הצד
  const base=LEADS.filter(l=>{
    if(sourceTab!=='all'&&l.source!==sourceTab)return false;
    if(l.relevance==='irrelevant')return false;
    return true;
  });
  const active=base.filter(l=>!['won','lost'].includes(l.status)).length;
  const week=base.filter(l=>{const n=daysUntil(l.event_date);return n!=null&&n>=0&&n<=7}).length;
  const month=base.filter(l=>{const n=daysUntil(l.event_date);return n!=null&&n>=0&&n<=30}).length;
  const won=base.filter(l=>l.status==='won').length;
  const conv=base.length?Math.round(won/base.length*100):0;
  $('#stats').innerHTML=`
    <div class="stat"><div class="n">${active}</div><div class="l">לידים פעילים</div></div>
    <div class="stat"><div class="n">${week}</div><div class="l">השבוע</div></div>
    <div class="stat"><div class="n">${month}</div><div class="l">החודש</div></div>
    <div class="stat"><div class="n">${won}</div><div class="l">נסגרו</div></div>
    <div class="stat"><div class="n">${conv}%</div><div class="l">המרה</div></div>`;
}

  const data=filtered();

  $('#main').innerHTML=`<div class="board">${STATUSES.map(s=>{

    return `<div class="col" data-status="${s.k}">

        <div class="label"><span class="swatch" style="background:${s.c}"></span><span>${s.l}</span></div>
        <span class="cnt">${items.length}</span>
      </div>
      <div class="col-body">${items.map(cardHTML).join('')||''}</div>

    c.ondragstart=e=>{e.dataTransfer.setData('id',c.dataset.id);c.classList.add('dragging')};
    c.ondragend=()=>c.classList.remove('dragging');
    c.onclick=e=>{if(!e.target.closest('a'))openDetail(c.dataset.id)};
  });
  $$('.col').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('dragover')};
    col.ondragleave=()=>col.classList.remove('dragover');
    col.ondrop=e=>{
      e.preventDefault();col.classList.remove('dragover');
      const id=e.dataTransfer.getData('id');
      const newStatus=col.dataset.status;
      const lead=LEADS.find(x=>x.id===id);
      if(lead&&lead.status!==newStatus){
        updateLead(id,{status:newStatus,updated_at:new Date().toISOString()});
        sb.from('crm_activities').insert({lead_id:id,kind:'status_change',body:`סטטוס שונה: ${STATUS_MAP[lead.status]?.l||lead.status} ← ${STATUS_MAP[newStatus].l}`,actor:'מערכת'});
      }
    };
  });
}

// ===== Mobile Cards View =====
function drawMobileCards(){
  const data=filtered();
  if(!data.length){$('#main').innerHTML=emptyStateHTML();wireEmptyState();return}

  // במצב "לא רלוונטי" — רשימה פשוטה בלי קיבוץ לפי דחיפות (זה ארכיון)
  if(filters.relevance==='irrelevant'){
    $('#main').innerHTML=`<div class="mob-cards"><div class="mob-section">
      <div class="mob-section-head"><span class="mob-section-icon">🗑</span><span class="mob-section-title">לא רלוונטי</span><span class="mob-section-cnt">${data.length}</span></div>
      ${data.map(mobCardHTML).join('')}
    </div></div>`;
    $$('.mob-card').forEach(c=>{c.onclick=e=>{if(e.target.closest('a')||e.target.closest('.mob-card-action'))return;openDetail(c.dataset.id)}});
    return;
  }

  // קיבוץ לפי דחיפות
  const groups={today:[],week:[],month:[],future:[],past:[],nodate:[]};
  data.forEach(l=>{
    const n=daysUntil(l.event_date);
    if(n==null)groups.nodate.push(l);
    else if(n===0)groups.today.push(l);
    else if(n>0&&n<=7)groups.week.push(l);
    else if(n>7&&n<=30)groups.month.push(l);
    else if(n>30)groups.future.push(l);
    else groups.past.push(l);
  });
  // מיון פנימי לפי תאריך אירוע (קרוב ביותר ראשון), הפסט ממוין מהקרוב ביותר
  const sortFn=(a,b)=>{
    const da=a.event_date?new Date(a.event_date).getTime():Infinity;
    const db=b.event_date?new Date(b.event_date).getTime():Infinity;
    return da-db;
  };
  groups.today.sort(sortFn);
  groups.week.sort(sortFn);
  groups.month.sort(sortFn);
  groups.future.sort(sortFn);
  groups.past.sort((a,b)=>new Date(b.event_date)-new Date(a.event_date)); // עבר - הכי קרוב לאחור
  groups.nodate.sort((a,b)=>new Date(b.received_at||0)-new Date(a.received_at||0));

  const sections=[
    {key:'today',title:'היום',cls:'today',icon:'🔥'},
    {key:'week',title:'השבוע',cls:'week',icon:'⚡'},
    {key:'month',title:'החודש',cls:'month',icon:'📅'},
    {key:'future',title:'עתידי',cls:'future',icon:'🗓️'},
    {key:'past',title:'אירועים שעברו',cls:'past',icon:'⏮'},
    {key:'nodate',title:'ללא תאריך',cls:'nodate',icon:'❓'},
  ].filter(s=>groups[s.key].length>0);

  $('#main').innerHTML=`<div class="mob-cards">${sections.map(s=>`
    <div class="mob-section">
      <div class="mob-section-head">
        <span class="mob-section-icon">${s.icon}</span>
        <span class="mob-section-title">${s.title}</span>
        <span class="mob-section-cnt">${groups[s.key].length}</span>
      </div>
      ${groups[s.key].map(mobCardHTML).join('')}
    </div>
  `).join('')}</div>`;

  $$('.mob-card').forEach(c=>{
    c.onclick=e=>{
      if(e.target.closest('a')||e.target.closest('.mob-card-action'))return;
      openDetail(c.dataset.id);
    };
  });
}

// ===== Dashboard =====
function drawDashboard(){
  // הדשבורד מתעלם מפילטרי סטטוס/תאריך — מציג תמונה כוללת של הטאב הנוכחי (ללא לא-רלוונטיים)
  const base=LEADS.filter(l=>{
    if(sourceTab!=='all'&&l.source!==sourceTab)return false;
    if(l.relevance==='irrelevant')return false;
    return true;
  });
  if(!base.length){$('#main').innerHTML=`<div class="empty"><div class="big">אין נתונים להצגה</div><div class="empty-sub">עדיין אין לידים בקטגוריה הזו</div></div>`;return}

  // 1. לפי מקור
  const bySource={};
  base.forEach(l=>{const k=SRC_LABEL[l.source]||l.source;bySource[k]=(bySource[k]||0)+1});

  // 2. לפי סטטוס
  const byStatus=STATUSES.map(s=>({label:s.l,color:s.c,count:base.filter(l=>l.status===s.k).length})).filter(x=>x.count>0);

  // 3. לאורך זמן (לפי חודש קבלה, 6 חודשים אחרונים)
  const byMonth={};
  base.forEach(l=>{
    if(!l.received_at)return;
    const d=new Date(l.received_at);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    byMonth[key]=(byMonth[key]||0)+1;
  });
  const monthKeys=Object.keys(byMonth).sort().slice(-6);
  const monthData=monthKeys.map(k=>{
    const [y,mo]=k.split('-');
    return {label:`${MONTHS[+mo-1].slice(0,3)} ${y.slice(2)}`,count:byMonth[k]};
  });

  // 4. לפי סוג אירוע (top 6)
  const byType={};
  base.forEach(l=>{const t=(l.event_type||'').trim();if(t)byType[t]=(byType[t]||0)+1});
  const typeData=Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([label,count])=>({label,count}));

  const srcColors=['#4a90d9','#2ecc71','#f1c40f','#9b59b6','#e67e22'];

  $('#main').innerHTML=`<div class="dash">
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-title">לידים לפי מקור</div>
        ${donutChart(Object.entries(bySource).map(([l,v],i)=>({label:l,count:v,color:srcColors[i%srcColors.length]})))}
      </div>
      <div class="dash-card">
        <div class="dash-title">לידים לפי סטטוס</div>
        ${barChart(byStatus,true)}
      </div>
      <div class="dash-card dash-card-wide">
        <div class="dash-title">לידים לאורך זמן</div>
        ${lineChart(monthData)}
      </div>
      <div class="dash-card dash-card-wide">
        <div class="dash-title">סוגי אירועים מובילים</div>
        ${typeData.length?barChart(typeData.map(t=>({label:t.label,count:t.count,color:'var(--gold)'})),false):'<div class="dash-empty">אין נתוני סוג אירוע</div>'}
      </div>
    </div>
  </div>`;
}

function donutChart(data){
  const total=data.reduce((s,d)=>s+d.count,0);
  if(!total)return '<div class="dash-empty">אין נתונים</div>';
  let acc=0;const R=52,C=2*Math.PI*R;
  const segs=data.map(d=>{
    const frac=d.count/total;
    const dash=frac*C;
    const seg=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${d.color}" stroke-width="22" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 70 70)"/>`;
    acc+=frac;return seg;
  }).join('');
  const legend=data.map(d=>`<div class="dash-legend-item"><span class="dash-legend-dot" style="background:${d.color}"></span>${esc(d.label)} <b>${d.count}</b> <span class="dash-legend-pct">(${Math.round(d.count/total*100)}%)</span></div>`).join('');
  return `<div class="dash-donut-wrap">
    <svg viewBox="0 0 140 140" class="dash-donut">${segs}
      <text x="70" y="64" text-anchor="middle" class="dash-donut-total">${total}</text>
      <text x="70" y="82" text-anchor="middle" class="dash-donut-label">לידים</text>
    </svg>
    <div class="dash-legend">${legend}</div>
  </div>`;
}

function barChart(data,useColors){
  if(!data.length)return '<div class="dash-empty">אין נתונים</div>';
  const max=Math.max(...data.map(d=>d.count));
  return `<div class="dash-bars">${data.map(d=>`
    <div class="dash-bar-row">
      <div class="dash-bar-label">${esc(d.label)}</div>
      <div class="dash-bar-track">
        <div class="dash-bar-fill" style="width:${Math.round(d.count/max*100)}%;background:${useColors&&d.color?d.color:'var(--gold)'}"></div>
      </div>
      <div class="dash-bar-val">${d.count}</div>
    </div>`).join('')}</div>`;
}

function lineChart(data){
  if(data.length<2)return '<div class="dash-empty">צריך לפחות חודשיים של נתונים</div>';
  const max=Math.max(...data.map(d=>d.count),1);
  const W=320,H=140,pad=28;
  const stepX=(W-pad*2)/(data.length-1);
  const pts=data.map((d,i)=>({x:pad+i*stepX,y:H-pad-(d.count/max)*(H-pad*2),...d}));
  const path=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const area=`M${pts[0].x} ${H-pad} `+pts.map(p=>`L${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')+` L${pts[pts.length-1].x} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" class="dash-line">
    <defs><linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#lineGrad)"/>
    <path d="${path}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="var(--gold)"/>
      <text x="${p.x.toFixed(1)}" y="${p.y-9}" text-anchor="middle" class="dash-line-val">${p.count}</text>
      <text x="${p.x.toFixed(1)}" y="${H-10}" text-anchor="middle" class="dash-line-x">${esc(p.label)}</text>`).join('')}
  </svg>`;
}

// ===== Calendar =====
function drawCalendar(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const evs={};
  filtered().forEach(l=>{
    if(!l.event_date)return;
    const d=new Date(l.event_date);
    if(d.getFullYear()===y&&d.getMonth()===m){
      const dy=d.getDate();(evs[dy]=evs[dy]||[]).push(l);
    }
  });
  let cells='';
  for(let i=0;i<first;i++)cells+='<div class="calcell empty"></div>';
  for(let d=1;d<=days;d++){
    const ev=(evs[d]||[]).map(l=>`<div class="calev" data-id="${l.id}" title="${esc(l.full_name)} · ${esc(l.event_type||'')}">${esc(l.full_name||'אירוע')}</div>`).join('');
    cells+=`<div class="calcell"><div class="d">${d}</div>${ev}</div>`;
  }
  $('#main').innerHTML=`<div class="calwrap">
    <div class="calnav"><button id="pm">‹ קודם</button><h3 class="serif">${MONTHS[m]} ${y}</h3><button id="nm">הבא ›</button><button id="tm">היום</button></div>
    <div class="calgrid">${DAYS.map(d=>`<div class="calhd">${d}</div>`).join('')}${cells}</div></div>`;
  $('#pm').onclick=()=>{calRef=new Date(y,m-1,1);drawCalendar()};
  $('#nm').onclick=()=>{calRef=new Date(y,m+1,1);drawCalendar()};
  $('#tm').onclick=()=>{calRef=new Date();drawCalendar()};
  $$('.calev').forEach(e=>e.onclick=()=>openDetail(e.dataset.id));
}

        ${l.phone?`<a class="qa call" href="tel:${esc(l.phone)}">📞 התקשר</a>`:''}
        ${wa?`<a class="qa wa" href="${wa}" target="_blank">💬 WhatsApp</a>`:''}
        ${l.email?`<a class="qa" href="mailto:${esc(l.email)}">✉️ מייל</a>`:''}
        <button class="qa del" id="x-del">🗑 מחק ליד</button>
      </div>

      <!-- Send menu -->
      ${l.phone?`<div class="menu-actions">
        <div class="menu-actions-label">שליחת תפריט אירועים בוואטסאפ:</div>
        <div class="menu-actions-btns">
          <button class="qa menu-btn dairy" id="x-menu-dairy">📄 תפריט חלבי</button>
          <button class="qa menu-btn meat" id="x-menu-meat">🥩 תפריט בשרי</button>
        </div>
      </div>`:''}

      <!-- Status -->
      <div class="detail-section">
        <div class="sec-title">סטטוס</div>
        <div class="status-grid" id="x-status">
          ${STATUSES.map(s=>`<button data-st="${s.k}" class="${s.k===l.status?'on':''}" style="${s.k===l.status?`background:${s.c}`:''}">
            <span class="dot" style="background:${s.c}"></span>${s.l}
          </button>`).join('')}
        </div>
      </div>

      <!-- Relevance & Assigned -->
      <div class="detail-section">
        <div class="sec-title">סיווג ואחריות</div>
        <div class="sel-row" style="margin-bottom:8px">
          <div class="seg rel" id="x-rel">
            ${RELEVANCE.map(r=>`<button data-rel="${r.k}" class="${r.k===(l.relevance||'unknown')?'on':''} ${r.k==='irrelevant'?'no':''}">${r.l}</button>`).join('')}
          </div>
        </div>
        <div class="sel-row">
          <div class="seg" id="x-assigned">
            ${ASSIGNEES.map(a=>`<button data-as="${a}" class="${a===l.assigned_to?'on':''}">${a}</button>`).join('')}
            <button data-as="" class="${!l.assigned_to?'on':''}">—</button>
          </div>
        </div>
      </div>

      <!-- Event details -->
      <div class="detail-section">
        <div class="sec-title">פרטי אירוע</div>
        <div class="fields">
          <div class="field"><label>סוג אירוע</label><input id="x-event_type" value="${esc(l.event_type)||''}" placeholder="חתונה / בר מצווה..." /></div>
          <div class="field"><label>תאריך אירוע</label><input id="x-event_date" type="date" value="${l.event_date||''}" /></div>
          <div class="field"><label>שעה</label><input id="x-event_time" value="${esc(l.event_time)||''}" placeholder="20:00" /></div>
          <div class="field"><label>אורחים</label><input id="x-guests_raw" value="${esc(l.guests_raw)||''}" placeholder="50-80" /></div>
          <div class="field"><label>תקציב גולמי</label><input id="x-budget_raw" value="${esc(l.budget_raw)||''}" placeholder="כפי שהגיע" /></div>
          <div class="field"><label>הצעת מחיר (₪)</label><input id="x-price_quoted" type="number" value="${l.price_quoted||''}" placeholder="0" /></div>
        </div>
        ${l.event_date_raw&&l.event_date_raw!==l.event_date?`<div class="field full readonly" style="margin-top:8px"><label>תאריך כפי שהגיע</label><div class="val">${esc(l.event_date_raw)}</div></div>`:''}
      </div>

      <!-- Contact -->
      <div class="detail-section">
        <div class="sec-title">פרטי קשר</div>
        <div class="fields">
          <div class="field"><label>שם מלא</label><input id="x-full_name" value="${esc(l.full_name)||''}" /></div>
          <div class="field"><label>טלפון</label><input id="x-phone" value="${esc(l.phone)||''}" /></div>
          <div class="field full"><label>אימייל</label><input id="x-email" value="${esc(l.email)||''}" type="email" /></div>
          ${l.source==='phone'?`<div class="field full"><label>מארחת שקיבלה את השיחה</label><input id="x-hostess" value="${esc(l.hostess)||''}" placeholder="שם המארחת" /></div>`:''}
        </div>
      </div>

      <!-- Notes -->
      <div class="detail-section">
        <div class="sec-title">הערות פנימיות</div>
        <div class="field full"><textarea id="x-notes" placeholder="הערות לצוות, פרטים חשובים, דברים לזכור...">${esc(l.notes)||''}</textarea></div>
      </div>

      <!-- Activities -->
      <div class="detail-section">
        <div class="sec-title">פעילות והיסטוריה</div>
        <div class="activity-add">
          <div class="act-kinds">
            ${ACT_KINDS.map(k=>`<button data-ak="${k.k}" class="${k.k===actDraft.kind?'on':''}">${k.ico} ${k.l}</button>`).join('')}
          </div>
          <textarea id="x-act-body" placeholder="${actDraft.kind==='call'?'מה דובר בשיחה?':actDraft.kind==='meeting'?'סיכום הפגישה':'תיאור...'}">${esc(actDraft.body)}</textarea>
          <div class="submit-row">
            <select class="who-select" id="x-act-actor">
              ${ASSIGNEES.map(a=>`<option value="${a}" ${a===actDraft.actor?'selected':''}>${a}</option>`).join('')}
            </select>
            <button class="add-btn" id="x-act-add">💾 שמור</button>
          </div>
        </div>
        <div class="timeline">
          ${acts.length?acts.map(actHTML).join(''):'<div class="timeline-empty">אין פעילות עדיין — הוסף שיחה / הערה / פגישה למעלה</div>'}
        </div>
      </div>

      <!-- Raw -->
      ${l.raw_body?`<div class="detail-section">
        <div class="sec-title">המייל המקורי</div>
        <div class="field full readonly"><div class="val" style="font-size:11px;white-space:pre-wrap;font-family:monospace;max-height:200px;overflow:auto">${esc(l.raw_body)}</div></div>
      </div>`:''}
    </div>
    <div class="detail-foot">
      <button class="save-bar" id="x-save"><span class="save-ico">✓</span><span class="save-txt">נשמר</span></button>
    </div>`;

  // Wire up
  // הערה: x-close מטופל ב-event delegation גלובלי (ראה wireGlobalDetailClose) כדי לעבוד תמיד גם אחרי ציור מחדש
  $('#x-del',el).onclick=()=>deleteLead(l.id);
  const md=$('#x-menu-dairy',el);if(md)md.onclick=()=>sendMenu('dairy',l);
  const mm=$('#x-menu-meat',el);if(mm)mm.onclick=()=>sendMenu('meat',l);

  // Status
  $$('#x-status button',el).forEach(b=>b.onclick=()=>{
    const newSt=b.dataset.st;
    if(newSt===l.status)return;
    sb.from('crm_activities').insert({lead_id:l.id,kind:'status_change',body:`סטטוס שונה: ${STATUS_MAP[l.status]?.l||l.status} ← ${STATUS_MAP[newSt].l}`,actor:'מערכת'});
    updateLead(l.id,{status:newSt,updated_at:new Date().toISOString()}).then(()=>{loadActs(l.id);drawDetail()});
  });
  // Relevance
  $$('#x-rel button',el).forEach(b=>b.onclick=()=>{
    updateLead(l.id,{relevance:b.dataset.rel}).then(()=>drawDetail());
  });
  // Assigned
  $$('#x-assigned button',el).forEach(b=>b.onclick=()=>{
    updateLead(l.id,{assigned_to:b.dataset.as||null}).then(()=>drawDetail());
  });

  // Field auto-save on blur + track pending edits while typing
  const bindField=(id,col,parse)=>{
    const inp=$('#'+id,el);if(!inp)return;
    inp.oninput=()=>{
      let v=inp.value;
      if(parse)v=parse(v.trim());
      else v=v.trim();
      if(v===''||v==null)v=null;
      if(v!==l[col]){pendingEdits[col]=v}
      else {delete pendingEdits[col]}
      updateSaveBar();
    };
    inp.onblur=()=>{
      if(col in pendingEdits){
        const v=pendingEdits[col];
        delete pendingEdits[col];
        updateLead(l.id,{[col]:v});
        updateSaveBar();
      }
    };
  };
  bindField('x-event_type','event_type');
  bindField('x-event_date','event_date',v=>v||null);
  bindField('x-event_time','event_time');
  bindField('x-guests_raw','guests_raw');
  bindField('x-budget_raw','budget_raw');
  bindField('x-price_quoted','price_quoted',v=>v?parseFloat(v):null);
  bindField('x-full_name','full_name');
  bindField('x-phone','phone');
  bindField('x-email','email');
  bindField('x-hostess','hostess');
  bindField('x-notes','notes');

  // Save bar — toggles between "saved" (idle) and "save changes" (dirty)
  function updateSaveBar(){
    const bar=$('#x-save',el);if(!bar)return;
    const dirty=Object.keys(pendingEdits).length>0;
    bar.classList.toggle('dirty',dirty);
    $('.save-ico',bar).textContent=dirty?'●':'✓';
    $('.save-txt',bar).textContent=dirty?'שמור שינויים':'נשמר';
  }
  updateSaveBar();

  $('#x-save',el).onclick=async()=>{
    if(!Object.keys(pendingEdits).length)return; // nothing to save
    const bar=$('#x-save',el);
    bar.classList.remove('dirty');
    bar.classList.add('saving');
    $('.save-ico',bar).textContent='⋯';
    $('.save-txt',bar).textContent='שומר...';
    const patch={...pendingEdits};
    pendingEdits={};
    const ok=await updateLead(l.id,patch);
    bar.classList.remove('saving');
    if(ok){
      updateSaveBar();
      showToast('נשמר');
    } else {
      // החזר את ה-pending אם נכשל
      Object.assign(pendingEdits,patch);
      updateSaveBar();
    }
  };

  // Activity add
  $$('#x-status, .activity-add .act-kinds button',el);
  $$('.act-kinds button',el).forEach(b=>b.onclick=()=>{
    actDraft.kind=b.dataset.ak;
    $$('.act-kinds button',el).forEach(x=>x.classList.toggle('on',x===b));
    const ph={call:'מה דובר בשיחה?',meeting:'סיכום הפגישה',message:'תוכן ההודעה',email:'תוכן/נושא המייל',note:'הערה'}[actDraft.kind]||'תיאור...';
    $('#x-act-body',el).placeholder=ph;
  });
  $('#x-act-body',el).oninput=e=>{actDraft.body=e.target.value};
  $('#x-act-actor',el).onchange=e=>{actDraft.actor=e.target.value};
  $('#x-act-add',el).onclick=()=>{
    if(!actDraft.body.trim())return;
    addActivity(l.id,actDraft.kind,actDraft.body,actDraft.actor);
  };
}
function actHTML(a){
  const k=ACT_KIND_MAP[a.kind]||{ico:'●',l:a.kind};
  const isSys=a.kind==='status_change';
  return `<div class="activity"${isSys?' style="background:var(--bg-soft);border-style:dashed"':''}>
    <div class="head">
      <div class="kind">${k.ico} ${k.l}</div>
      <div class="when">${fmtRel(a.created_at)}</div>
    </div>
    <div class="body">${esc(a.body)}</div>
    ${a.actor&&!isSys?`<div class="actor">— ${esc(a.actor)}</div>`:''}
  </div>`;
}

// ===== Add Lead Modal =====
function drawAddModal(){
  let m=document.querySelector('.add-modal');
  if(!showAddModal){
    if(m)m.remove();
    $('#scrim').classList.remove('open');
    return;
  }
  $('#scrim').classList.add('open');
  if(!m){
    m=document.createElement('div');
    m.className='add-modal';
    document.body.appendChild(m);
  }
  m.innerHTML=`
    <div class="add-head">
      <div>
        <div class="add-title serif">ליד חדש</div>
        <div class="add-sub">ליד טלפוני שהגיע ממארחת</div>
      </div>
      <button class="close" id="add-x">✕</button>
    </div>
    <div class="add-body">
      <div class="fields">
        <div class="field"><label>שם מלא *</label><input id="a-full_name" value="${esc(addDraft.full_name)}" placeholder="ישראל ישראלי" autofocus /></div>
        <div class="field"><label>טלפון *</label><input id="a-phone" value="${esc(addDraft.phone)}" placeholder="054-1234567" type="tel" /></div>
        <div class="field full"><label>מארחת שקיבלה את השיחה</label><input id="a-hostess" value="${esc(addDraft.hostess)}" placeholder="שם המארחת" /></div>
        <div class="field"><label>סוג אירוע</label><input id="a-event_type" value="${esc(addDraft.event_type)}" placeholder="יום הולדת / בר מצווה..." /></div>
        <div class="field"><label>תאריך אירוע</label><input id="a-event_date" value="${addDraft.event_date}" type="date" /></div>
        <div class="field"><label>שעת אירוע</label><input id="a-event_time" value="${esc(addDraft.event_time)}" placeholder="20:00" /></div>
        <div class="field"><label>כמות אורחים</label><input id="a-guests_raw" value="${esc(addDraft.guests_raw)}" placeholder="50 / 30-50" /></div>
        <div class="field full"><label>הערות (מה הלקוח אמר?)</label><textarea id="a-notes" placeholder="פרטים נוספים מהשיחה...">${esc(addDraft.notes)}</textarea></div>
      </div>
    </div>
    <div class="add-foot">
      <button class="btn-secondary" id="add-cancel">ביטול</button>
      <button class="btn-primary" id="add-save">צור ליד</button>
    </div>`;

  // bindings
  const bind=(id,k)=>{const e=$('#'+id,m);if(e)e.oninput=ev=>addDraft[k]=ev.target.value};
  bind('a-full_name','full_name');
  bind('a-phone','phone');
  bind('a-hostess','hostess');
  bind('a-event_type','event_type');
  bind('a-event_date','event_date');
  bind('a-event_time','event_time');
  bind('a-guests_raw','guests_raw');
  bind('a-notes','notes');

  const closeModal=()=>{showAddModal=false;drawAddModal()};
  $('#add-x',m).onclick=closeModal;
  $('#add-cancel',m).onclick=closeModal;
  $('#add-save',m).onclick=createLead;
}

init();
</script>
</body>
</html>
